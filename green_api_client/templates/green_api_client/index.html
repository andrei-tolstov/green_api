<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GREEN-API Client</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; background-color: #f5f5f5; margin: 0; padding: 20px; }
        .container { display: flex; flex-direction: row; gap: 20px; width: 100%; max-width: 1000px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .left-panel { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .right-panel { flex: 1; display: flex; flex-direction: column; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        input[type="text"], textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: inherit; }
        textarea { resize: vertical; }
        .btn { padding: 10px; background-color: #f0f0f0; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; text-align: center; font-weight: bold; font-family: inherit; }
        .btn:hover { background-color: #e0e0e0; }
        .response-box { flex-grow: 1; border: 1px solid #ccc; border-radius: 4px; padding: 10px; background-color: #fdfdfd; font-family: 'Courier New', Courier, monospace; white-space: pre-wrap; overflow-y: auto; height: 100%; min-height: 480px; font-size: 14px;}
        .section { padding-top: 15px; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <div class="left-panel">
        <form method="post" id="api-form">
            {% csrf_token %}
            
            <div class="input-group">
                <input type="text" name="idInstance" placeholder="idInstance" value="{{ idInstance|default_if_none:'' }}" required>
            </div>
            <div class="input-group" style="margin-bottom: 5px;">
                <input type="text" name="ApiTokenInstance" placeholder="ApiTokenInstance" value="{{ ApiTokenInstance|default_if_none:'' }}" required>
            </div>
            
            <div class="section">
                <button type="submit" name="action" value="getSettings" class="btn" style="width: 100%;">getSettings</button>
            </div>
            
            <div class="section" style="padding-top: 5px; border-top: none;">
                <button type="submit" name="action" value="getStateInstance" class="btn" style="width: 100%;">getStateInstance</button>
            </div>
            
            <div class="section input-group">
                <input type="text" name="phone_number_msg" placeholder="77771234567" value="{{ phone_number_msg }}">
                <textarea name="message_text" rows="3" placeholder="hello World!">{{ message_text }}</textarea>
                <button type="submit" name="action" value="sendMessage" class="btn">sendMessage</button>
            </div>
            
            <div class="section input-group">
                <input type="text" name="phone_number_file" placeholder="77771234567" value="{{ phone_number_file }}">
                <input type="text" name="file_url" placeholder="https://my.site.com/img/horse.png" value="{{ file_url }}">
                <button type="submit" name="action" value="sendFileByUrl" class="btn">sendFileByUrl</button>
            </div>
        </form>
    </div>
    
    <div class="right-panel">
        <label style="margin-bottom: 10px; font-weight: bold; font-size: 16px;">Ответ:</label>
        <textarea class="response-box" readonly>{% if response %}{{ response }}{% endif %}</textarea>
        {% if error %}
        <div style="color: #d9534f; margin-top: 10px; font-weight: 500; font-size: 14px;">{{ error }}</div>
        {% endif %}
    </div>
</div>

</body>
</html>
